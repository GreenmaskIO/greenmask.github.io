<svg viewBox="0 0 560 320" preserveAspectRatio="xMidYMid slice" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <linearGradient id="syFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000"/>
      <stop offset="0.32" stop-color="#fff"/>
      <stop offset="0.68" stop-color="#fff"/>
      <stop offset="1" stop-color="#000"/>
    </linearGradient>
    <mask id="syFadeMask"><rect width="560" height="320" fill="url(#syFade)"/></mask>
    <filter id="syGlow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <!-- Two overlapping circles -->
  <g mask="url(#syFadeMask)">
    <circle cx="230" cy="160" r="115" fill="none" stroke="#FBFBFB" stroke-opacity="0.22" stroke-width="1"/>
    <g fill="none" stroke="#27D9B6" stroke-width="2.5" stroke-opacity="0.5" filter="url(#syGlow)">
      <circle cx="330" cy="160" r="115"/>
    </g>
    <g fill="none" stroke="#14C19A" stroke-width="1" stroke-opacity="0.95">
      <circle cx="330" cy="160" r="115"/>
    </g>
    <g fill="none" stroke="#6FF0D4" stroke-width="1" stroke-opacity="0.3">
      <circle cx="330" cy="160" r="115"/>
    </g>
  </g>
</svg>
